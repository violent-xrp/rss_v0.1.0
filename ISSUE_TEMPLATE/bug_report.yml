name: Bug report
description: Report a reproducible defect in RSS
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please include enough detail for us to reproduce the problem.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the problem.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: Describe the expected behavior.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Please provide a minimal, repeatable sequence.
      placeholder: |
        1. Run ...
        2. Configure ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, runtime mode, database state, etc.
      placeholder: |
        OS:
        Python:
        RSS version:
        DB:
        LLM adapter:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output, logs, or trace details
      description: Paste errors, trace events, or screenshots if helpful.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help.